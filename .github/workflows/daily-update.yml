name: Deploy AI Tools Radar

on:
  push:
    branches: [master]
    paths: ['site/**']
  
  # 每天 UTC 0:00（北京时间 08:00）自动采集 + 部署
  schedule:
    - cron: '0 0 * * *'
  
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 定时触发 或 手动触发时：运行采集流水线
      - name: Setup Python
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          pip install httpx google-generativeai

      - name: Run collection pipeline
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd ${{ github.workspace }}
          python scripts/pipeline.py

      - name: Commit new data
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ site/
          git diff --staged --quiet || git commit -m "Daily update: $(date -u +%Y-%m-%d)"
          git push

      # 所有触发方式都部署
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
