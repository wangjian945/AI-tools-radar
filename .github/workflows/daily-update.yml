name: Deploy AI Tools Radar

on:
  # push 到 main 分支时自动部署（监听 site/ 目录）
  push:
    branches: [main]
    paths: ['site/**']
  
  # 每天 UTC 0:00（北京时间 08:00）自动采集 + 部署
  schedule:
    - cron: '0 0 * * *'
  
  # 手动触发（方便测试）
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
